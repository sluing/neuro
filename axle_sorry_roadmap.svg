<svg width="100%" viewBox="0 0 680 772" role="img" xmlns="http://www.w3.org/2000/svg">
<title>AXLE sorry roadmap — v5 through v8.2</title>
<desc>Complete guide to closing all sorry marks across the AXLE Lean files</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, "Segoe UI", "Helvetica Neue", sans-serif; }
    .t-title  { font-size:14px; font-weight:500; fill:#faf9f5; }
    .t-sub    { font-size:12px; fill:#c2c0b6; }
    .t-col    { font-size:11px; font-weight:500; fill:#faf9f5; }
    .t-div    { font-size:10px; fill:#c2c0b6; }
    /* green — closeable now */
    .g-name   { font-size:11px; font-weight:500; fill:#9fe1cb; }
    .g-sm     { font-size:10px; fill:#5dcaa5; }
    /* blue — needs Mathlib */
    .b-name   { font-size:11px; font-weight:500; fill:#b5d4f4; }
    .b-sm     { font-size:10px; fill:#85b7eb; }
    /* orange — open conjecture */
    .o-name   { font-size:11px; font-weight:500; fill:#f5c4b3; }
    .o-sm     { font-size:10px; fill:#f0997b; }
    /* red — stays sorry */
    .r-name   { font-size:11px; font-weight:500; fill:#f7c1c1; }
    .r-sm     { font-size:10px; fill:#f09595; }
    /* interactive */
    g[onclick]          { cursor: pointer; }
    g[onclick] rect.row { transition: filter 0.12s; }
    g[onclick]:hover rect.row { filter: brightness(1.25); }
  </style>
</defs>

<!-- ── Dark background ── -->
