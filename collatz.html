  <div class="section-label">Category</div>
  <h2 class="gold-underline">What This Work Is</h2>

  <p>
    This artifact is <strong>not</strong> a claimed proof of the Collatz conjecture. 
    It is a <strong>structural and dynamical reinterpretation</strong> of the Collatz map within the 
    DM3 / GTCT framework. All internal GTCT theorems are formalized; all external bridges 
    to Collatz are explicitly marked as open. No hidden invariants, no unverified identifications.
  </p>

  <p>
    The work belongs to the category of 
    <em>structural reinterpretation of discrete dynamics via geometric and generative frameworks</em>.
  </p>
</div>

<div class="section">
  <div class="section-label">Formalized core</div>
  <h2 class="gold-underline">What Is Actually Proved</h2>

  <p>
    The formalization includes the full internal machinery of GTCT (Vol. IV–V):
  </p>
  <ul>
    <li><strong>Orthogonality, Pythagorean contraction, recursive evolution, spectral collapse.</strong></li>
    <li><strong>12-phase operator cycle and D₆ permutation structure.</strong></li>
    <li><strong>Nilpotent ε-operator and contact-compatible generative chain.</strong></li>
  </ul>

  <p>
    In addition, the contact-geometry model from Vol. V, Chapter H is formalized:
  </p>
  <ul>
    <li><strong>Hamiltonian system</strong> 
      \( H_0(q,p,z) = z + \frac{(q-1)^2(q+2)}{6} \) (as specified in the text).</li>
    <li><strong>Associated contact vector field</strong> \(X_H\) and fold structure at \(q = 1\).</li>
    <li><strong>Uniqueness of the parameter \(c = 3\)</strong> for the fold argument (up to the π-case).</li>
    <li><strong>Local Poincaré section geometry</strong> compatible with the GTCT setup.</li>
  </ul>

  <p>
    Everything explicitly proved in the books is reproduced faithfully in the formal environment.
  </p>
</div>

<div class="section">
  <div class="section-label">Open bridges</div>
  <h2 class="gold-underline">What Is Not Proved (5 Explicit Gaps)</h2>

  <p>
    Five bridges remain open, all explicitly acknowledged in the source texts and in the formalization:
  </p>
  <ul>
    <li><strong>Structural Hypothesis SH:</strong> a global orthogonality condition on the 12 operators; declared, not derived.</li>
    <li><strong>Phase-field ↔ arithmetic embedding \(q \sim n\):</strong> the analytic–combinatorial bridge from phase space to integers.</li>
    <li><strong>Poincaré return map = Collatz map:</strong> the assertion that the return map of \(X_H\) on \(\{z=0\}\) equals the Collatz function \(T\).</li>
    <li><strong>Global construction of \(u_i, w_i\):</strong> required to satisfy SH for all \(v \in \mathbb{R}^{12}\).</li>
    <li><strong>Derivation of \(g^6 = 33\):</strong> currently a combinatorial count, not a derived invariant.</li>
  </ul>

  <p>
    These are not hidden gaps; they are documented as open problems and form the roadmap for a potential Volume VI.
  </p>
</div>

<div class="section">
  <div class="section-label">Mathematical value</div>
  <h2 class="gold-underline">Why This Work Matters</h2>

  <p>
    Even without claiming a proof of Collatz, the artifact is mathematically valuable:
  </p>
  <ul>
    <li><strong>Coherent structural reinterpretation:</strong> Collatz is reframed as a scale-dynamic system with cycle-scale oscillations, soft equilibrium drift, and phase-change thresholds.</li>
    <li><strong>Transparent assumption ledger:</strong> a clean separation between what is proved, what is assumed, and what remains open.</li>
    <li><strong>Fully formalized core:</strong> the GTCT internal machinery is explicit, checkable, and machine-verified.</li>
    <li><strong>Interface for future work:</strong> provides a precise list of open problems and a geometric model that may inspire new approaches.</li>
  </ul>
</div>

<div class="section">

  <p>

  <p>

  </p>
