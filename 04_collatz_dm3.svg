<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="collatzBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080a10"/>
      <stop offset="100%" style="stop-color:#0a0c18"/>
    </linearGradient>
    <linearGradient id="attractorGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#204060"/>
      <stop offset="100%" style="stop-color:#081828"/>
    </linearGradient>
    <filter id="gC">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6090c0"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c06050"/>
    </marker>
  </defs>

  <rect width="900" height="540" fill="url(#collatzBg)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" letter-spacing="3" filter="url(#gC)">COLLATZ AS dm³ SYSTEM</text>
  <text x="450" y="56" text-anchor="middle" fill="#5a7090" font-size="11" letter-spacing="2">AXLE Target 5 — Structural Framework for Decidability</text>
  <line x1="80" y1="65" x2="820" y2="65" stroke="#c9a84c22" stroke-width="0.5"/>

  <!-- LEFT: The Collatz rule -->
  <rect x="30" y="82" width="210" height="200" rx="6" fill="#080e18" stroke="#304060" stroke-width="1"/>
  <text x="135" y="105" text-anchor="middle" fill="#6090c0" font-size="13" font-weight="bold">THE MAP</text>
  <text x="135" y="122" text-anchor="middle" fill="#406090" font-size="9" letter-spacing="2">T : ℕ → ℕ</text>
  <line x1="50" y1="130" x2="220" y2="130" stroke="#30406022" stroke-width="0.5"/>

  <text x="50" y="152" fill="#8ab0d0" font-size="13" font-style="italic">T(n) =</text>
  <rect x="100" y="138" width="120" height="62" rx="4" fill="#0a1424" stroke="#2a4060" stroke-width="0.5"/>
  <text x="114" y="158" fill="#80b0d0" font-size="11">n/2</text>
  <text x="178" y="158" fill="#4a7090" font-size="9">if n even</text>
  <line x1="108" y1="164" x2="218" y2="164" stroke="#2a405022" stroke-width="0.5"/>
  <text x="114" y="182" fill="#80b0d0" font-size="11">3n+1</text>
  <text x="178" y="182" fill="#4a7090" font-size="9">if n odd</text>

  <text x="50" y="215" fill="#5a7890" font-size="9.5">Mean ratio per step:</text>
  <text x="50" y="232" fill="#8abacc" font-size="11">½·(1/2) + ½·(3/2) = 1</text>
  <text x="50" y="250" fill="#4a6870" font-size="9">But c = 3: ratio = 3/4 &lt; 1</text>
  <text x="50" y="267" fill="#6aaabb" font-size="10" font-style="italic">mean contraction ✓</text>

  <!-- Orbit examples -->
  <rect x="30" y="295" width="210" height="130" rx="6" fill="#080e18" stroke="#304060" stroke-width="1"/>
  <text x="135" y="315" text-anchor="middle" fill="#6090c0" font-size="11">ORBIT EXAMPLES</text>
  <text x="45" y="335" fill="#5a8090" font-size="8.5">n=6:  6→3→10→5→16→8→4→2→1</text>
  <text x="45" y="352" fill="#4a7080" font-size="8.5">n=27: 27→82→41→124→ ... →1</text>
  <text x="45" y="369" fill="#607880" font-size="8">(111 steps, peak = 9232)</text>
  <text x="45" y="390" fill="#8abbc0" font-size="9">All tested n ≤ 2⁶⁸ reach {4,2,1}</text>
  <text x="45" y="408" fill="#4a6870" font-size="8.5">No divergent orbit found ← Axiom 7</text>

  <!-- CENTER: dm3 embedding diagram -->
  <rect x="275" y="82" width="350" height="343" rx="8" fill="#080c14" stroke="#5070a0" stroke-width="1.5"/>
  <text x="450" y="108" text-anchor="middle" fill="#8090c0" font-size="13" font-weight="bold">dm³ EMBEDDING</text>
  <text x="450" y="125" text-anchor="middle" fill="#5060a0" font-size="9" letter-spacing="2">ℕ → Contact Manifold M</text>

  <!-- The 4 operator column -->
  <!-- C box -->
  <rect x="295" y="142" width="130" height="58" rx="5" fill="#0a1030" stroke="#3050a0" stroke-width="1"/>
  <text x="360" y="162" text-anchor="middle" fill="#7090d0" font-size="14" font-weight="bold">C</text>
  <text x="360" y="178" text-anchor="middle" fill="#3050a0" font-size="9">n → orbit parity class</text>
  <text x="360" y="191" text-anchor="middle" fill="#2a3880" font-size="8.5">compress to even/odd</text>

  <!-- Arrow down -->
  <line x1="360" y1="200" x2="360" y2="222" stroke="#5070a0" stroke-width="1" marker-end="url(#arrC)"/>

  <!-- K box -->
  <rect x="295" y="222" width="130" height="58" rx="5" fill="#100a30" stroke="#7050a0" stroke-width="1"/>
  <text x="360" y="242" text-anchor="middle" fill="#a080d0" font-size="14" font-weight="bold">K</text>
  <text x="360" y="258" text-anchor="middle" fill="#7050a0" font-size="9">curvature of orbit path</text>
  <text x="360" y="271" text-anchor="middle" fill="#5038a0" font-size="8.5">κ → κ* at fold pts</text>

  <!-- Arrow down -->
  <line x1="360" y1="280" x2="360" y2="302" stroke="#5070a0" stroke-width="1" marker-end="url(#arrC)"/>

  <!-- F box -->
  <rect x="295" y="302" width="130" height="58" rx="5" fill="#081808" stroke="#307050" stroke-width="1"/>
  <text x="360" y="322" text-anchor="middle" fill="#70c090" font-size="14" font-weight="bold">F</text>
  <text x="360" y="338" text-anchor="middle" fill="#407060" font-size="9">Whitney fold at peak</text>
  <text x="360" y="351" text-anchor="middle" fill="#306050" font-size="8.5">orbit begins descent</text>

  <!-- Arrow down -->
  <line x1="360" y1="360" x2="360" y2="382" stroke="#5070a0" stroke-width="1" marker-end="url(#arrC)"/>

  <!-- U box -->
  <rect x="295" y="382" width="130" height="30" rx="5" fill="#181008" stroke="#806040" stroke-width="1"/>
  <text x="360" y="401" text-anchor="middle" fill="#c0a060" font-size="14" font-weight="bold">U</text>

  <!-- RIGHT side: what this buys us -->
  <rect x="440" y="142" width="170" height="270" rx="5" fill="#080c18" stroke="#304060" stroke-width="0.5"/>
  <text x="525" y="162" text-anchor="middle" fill="#6080a0" font-size="10" letter-spacing="1">AXIOM CHECK</text>
  <line x1="455" y1="168" x2="598" y2="168" stroke="#30406022" stroke-width="0.5"/>

  <text x="455" y="183" fill="#7090b0" font-size="8.5">Ax 1: M is compact</text>
  <text x="585" y="183" text-anchor="end" fill="#50c070" font-size="8.5">✓ asserted</text>
  <text x="455" y="198" fill="#7090b0" font-size="8.5">Ax 2: Contact structure ξ</text>
  <text x="585" y="198" text-anchor="end" fill="#50c070" font-size="8.5">✓ asserted</text>
  <text x="455" y="213" fill="#7090b0" font-size="8.5">Ax 3: C is Lipschitz</text>
  <text x="585" y="213" text-anchor="end" fill="#50c070" font-size="8.5">✓ asserted</text>
  <text x="455" y="228" fill="#7090b0" font-size="8.5">Ax 4: K drives κ → κ*</text>
  <text x="585" y="228" text-anchor="end" fill="#50c070" font-size="8.5">✓ asserted</text>
  <text x="455" y="243" fill="#7090b0" font-size="8.5">Ax 5: Whitney fold at κ*</text>
  <text x="585" y="243" text-anchor="end" fill="#50c070" font-size="8.5">✓ asserted</text>
  <text x="455" y="258" fill="#7090b0" font-size="8.5">Ax 6: Lyapunov Φ exists</text>
  <text x="585" y="258" text-anchor="end" fill="#50c070" font-size="8.5">✓ asserted</text>
  <text x="455" y="278" fill="#c08070" font-size="8.5">Ax 7: No divergent orbits</text>
  <text x="585" y="278" text-anchor="end" fill="#e06050" font-size="8.5">⚠ open</text>
  <rect x="453" y="265" width="135" height="18" rx="2" fill="#c0504022" stroke="#e0605033" stroke-width="0.5"/>
  <text x="455" y="293" fill="#7090b0" font-size="8.5">Ax 8: Unique attractor</text>
  <text x="585" y="293" text-anchor="end" fill="#e06050" font-size="8.5">⚠ open</text>

  <line x1="453" y1="305" x2="600" y2="305" stroke="#30406022" stroke-width="0.5"/>
  <text x="525" y="320" text-anchor="middle" fill="#708090" font-size="8.5">Structural Hypothesis SH</text>
  <text x="525" y="335" text-anchor="middle" fill="#e07050" font-size="8.5">OPEN — deferred Vol. VI</text>
  <text x="525" y="355" text-anchor="middle" fill="#507090" font-size="8">Lean 4 verification target</text>
  <text x="525" y="370" text-anchor="middle" fill="#405070" font-size="8">AXLE Target 5</text>

  <!-- RIGHT: Attractor basin -->
  <rect x="660" y="82" width="210" height="200" rx="6" fill="#080e18" stroke="#304060" stroke-width="1"/>
  <text x="765" y="105" text-anchor="middle" fill="#6090c0" font-size="11">ATTRACTOR BASIN</text>
  <text x="765" y="121" text-anchor="middle" fill="#3060a0" font-size="9">{4 → 2 → 1 → 4...}</text>

  <!-- Spiral into attractor -->
  <circle cx="765" cy="210" r="55" fill="none" stroke="#204050" stroke-width="0.5" stroke-dasharray="3,3"/>
  <circle cx="765" cy="210" r="38" fill="none" stroke="#305060" stroke-width="0.5" stroke-dasharray="3,3"/>
  <circle cx="765" cy="210" r="22" fill="none" stroke="#406070" stroke-width="1"/>
  <circle cx="765" cy="210" r="10" fill="#204060" stroke="#6090c0" stroke-width="1.5"/>
  <text x="765" y="214" text-anchor="middle" fill="#8ab0d0" font-size="8">1</text>

  <!-- Orbit spiral paths -->
  <path d="M 765 155 Q 820 155 820 210 Q 820 265 765 265 Q 710 265 710 210 Q 710 180 730 168" fill="none" stroke="#6090c060" stroke-width="1"/>
  <path d="M 735 145 Q 815 140 825 215 Q 832 278 770 275" fill="none" stroke="#6090c040" stroke-width="0.8"/>

  <text x="765" y="148" text-anchor="middle" fill="#4a7090" font-size="8.5">n = 27</text>
  <text x="680" y="210" fill="#3a6080" font-size="8">orbit →</text>

  <!-- RIGHT: What the paper claims -->
  <rect x="660" y="295" width="210" height="130" rx="6" fill="#080e18" stroke="#304060" stroke-width="1"/>
  <text x="765" y="315" text-anchor="middle" fill="#6090c0" font-size="10">PAPER CLAIM</text>
  <text x="765" y="330" text-anchor="middle" fill="#3060a0" font-size="8" letter-spacing="1">(Zenodo, honest version)</text>
  <line x1="675" y1="337" x2="855" y2="337" stroke="#30406022" stroke-width="0.5"/>
  <text x="675" y="354" fill="#7090b0" font-size="8.5">"The Collatz map is visible</text>
  <text x="675" y="369" fill="#7090b0" font-size="8.5">within the crystal geometry</text>
  <text x="675" y="384" fill="#7090b0" font-size="8.5">before it is axiomatic."</text>
  <text x="675" y="405" fill="#506880" font-size="8">Central open problem:</text>
  <text x="675" y="419" fill="#c09060" font-size="8.5">formalize Ax 7 in Lean 4</text>

  <!-- Bottom bar -->
  <rect x="30" y="450" width="840" height="72" rx="5" fill="#060810" stroke="#c9a84c22" stroke-width="1"/>
  <text x="450" y="472" text-anchor="middle" fill="#c9a84c88" font-size="10" letter-spacing="2">c = 3 FINGERPRINT — STRUCTURAL OBSERVATION</text>
  <text x="450" y="491" text-anchor="middle" fill="#8090a0" font-size="10">Mean step ratio: ½·(1/2) + ½·(3/2) = 1  but  c=3 gives effective ratio 3/4 &lt; 1 → mean contraction</text>
  <text x="450" y="508" text-anchor="middle" fill="#607080" font-size="9">c=5 would give 5/4 &gt; 1 (divergent) · c=3 is the minimal odd constant producing mean contraction</text>
  <text x="450" y="523" text-anchor="middle" fill="#404858" font-size="8.5">This is a genuine structural observation independent of dm³ — publishable on its own merits (§4, Zenodo paper)</text>

  <text x="450" y="537" text-anchor="middle" fill="#c9a84c22" font-size="7" letter-spacing="4">github.com/totogt/axle</text>
</svg>
