<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <radialGradient id="saturnBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0d1830"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </radialGradient>
    <radialGradient id="planetGrad" cx="48%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#d4a850"/>
      <stop offset="40%" style="stop-color:#c4903a"/>
      <stop offset="100%" style="stop-color:#7a5020"/>
    </radialGradient>
    <radialGradient id="hexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4080ff44"/>
      <stop offset="100%" style="stop-color:#4080ff00"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6aa0e0"/>
    </marker>
    <marker id="arrGold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#saturnBg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="50" cy="30" r="0.8"/><circle cx="120" cy="15" r="0.5"/><circle cx="200" cy="45" r="0.7"/>
    <circle cx="780" cy="20" r="0.6"/><circle cx="850" cy="50" r="0.9"/><circle cx="30" cy="80" r="0.5"/>
    <circle cx="870" cy="120" r="0.6"/><circle cx="15" cy="150" r="0.8"/><circle cx="890" cy="200" r="0.5"/>
    <circle cx="60" cy="480" r="0.7"/><circle cx="840" cy="470" r="0.6"/><circle cx="10" cy="400" r="0.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#c9a84c" font-size="18" letter-spacing="4" filter="url(#starGlow)">SATURN'S HEXAGON AS dm³ SYSTEM</text>
  <text x="450" y="58" text-anchor="middle" fill="#6a8ab0" font-size="11" letter-spacing="2">TOGT Canonical Instantiation — North Polar Vortex, n = 6</text>

  <!-- Saturn planet body -->
  <ellipse cx="450" cy="300" rx="130" ry="118" fill="url(#planetGrad)" opacity="0.9"/>
  <!-- Saturn bands -->
  <ellipse cx="450" cy="270" rx="128" ry="18" fill="#b88030" opacity="0.3"/>
  <ellipse cx="450" cy="295" rx="129" ry="14" fill="#c89040" opacity="0.2"/>
  <ellipse cx="450" cy="320" rx="127" ry="16" fill="#a87028" opacity="0.3"/>
  <!-- Ring -->
  <ellipse cx="450" cy="340" rx="210" ry="28" fill="none" stroke="#c9a84c" stroke-width="6" opacity="0.35"/>
  <ellipse cx="450" cy="340" rx="185" ry="22" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.2"/>
  <!-- Planet overlay -->
  <ellipse cx="450" cy="300" rx="130" ry="118" fill="none" stroke="#d4b060" stroke-width="0.5" opacity="0.4"/>

  <!-- Hexagon glow circle -->
  <circle cx="450" cy="200" r="72" fill="url(#hexGlow)"/>

  <!-- THE HEXAGON (polar, centered at north pole projection) -->
  <!-- n=6 hexagon, radius ~62px, centered at 450,200 -->
  <polygon 
    points="450,138 504,169 504,231 450,262 396,231 396,169"
    fill="none" stroke="#5090e0" stroke-width="2.5" filter="url(#softGlow)" opacity="0.9"/>
  <!-- Fold points (corners) -->
  <circle cx="450" cy="138" r="5" fill="#e06050" filter="url(#starGlow)"/>
  <circle cx="504" cy="169" r="5" fill="#e06050" filter="url(#starGlow)"/>
  <circle cx="504" cy="231" r="5" fill="#e06050" filter="url(#starGlow)"/>
  <circle cx="450" cy="262" r="5" fill="#e06050" filter="url(#starGlow)"/>
  <circle cx="396" cy="231" r="5" fill="#e06050" filter="url(#starGlow)"/>
  <circle cx="396" cy="169" r="5" fill="#e06050" filter="url(#starGlow)"/>

  <!-- Inner vortex circle -->
  <circle cx="450" cy="200" r="32" fill="none" stroke="#80b0ff" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="450" cy="200" r="8" fill="#4060c0" opacity="0.8" filter="url(#starGlow)"/>
  <text x="450" y="204" text-anchor="middle" fill="#a0c0ff" font-size="7">∇Φ=0</text>

  <!-- OPERATOR ANNOTATION BOXES -->

  <!-- C — left upper -->
  <rect x="30" y="100" width="150" height="80" rx="5" fill="#0a1a30" stroke="#2a5080" stroke-width="1"/>
  <text x="105" y="120" text-anchor="middle" fill="#6ab4d8" font-size="16" font-weight="bold">C</text>
  <text x="105" y="135" text-anchor="middle" fill="#4a8ab0" font-size="9" letter-spacing="2">COMPRESSION</text>
  <text x="42" y="153" fill="#6a9ab0" font-size="9">3D atmosphere →</text>
  <text x="42" y="167" fill="#6a9ab0" font-size="9">quasi-2D jet layer</text>
  <line x1="180" y1="140" x2="394" y2="170" stroke="#4a8ab0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- K — right upper -->
  <rect x="718" y="100" width="155" height="90" rx="5" fill="#0e0a20" stroke="#5a3090" stroke-width="1"/>
  <text x="795" y="120" text-anchor="middle" fill="#a07ae0" font-size="16" font-weight="bold">K</text>
  <text x="795" y="135" text-anchor="middle" fill="#7a5ab0" font-size="9" letter-spacing="2">CURVATURE</text>
  <text x="728" y="153" fill="#9070c0" font-size="9">Rossby wave κ → κ*</text>
  <text x="728" y="167" fill="#9070c0" font-size="9">selects wavenumber</text>
  <text x="728" y="182" fill="#806aaa" font-size="9" font-style="italic">n = 6, not 5 or 7</text>
  <line x1="718" y1="155" x2="506" y2="170" stroke="#7a5ab0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- F — right lower -->
  <rect x="718" y="280" width="155" height="90" rx="5" fill="#081808" stroke="#2a7050" stroke-width="1"/>
  <text x="795" y="300" text-anchor="middle" fill="#6ad0a0" font-size="16" font-weight="bold">F</text>
  <text x="795" y="315" text-anchor="middle" fill="#4ab07a" font-size="9" letter-spacing="2">FOLDING</text>
  <text x="728" y="333" fill="#6ab090" font-size="9">Whitney A₁ fires at κ*</text>
  <text x="728" y="348" fill="#6ab090" font-size="9">6 corners lock (sharp!)</text>
  <text x="728" y="363" fill="#508070" font-size="9" font-style="italic">det(Df) → 0 at corners</text>
  <line x1="718" y1="315" x2="507" y2="232" stroke="#4ab07a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- U — left lower -->
  <rect x="30" y="280" width="155" height="90" rx="5" fill="#1a0e06" stroke="#805030" stroke-width="1"/>
  <text x="107" y="300" text-anchor="middle" fill="#d0a060" font-size="16" font-weight="bold">U</text>
  <text x="107" y="315" text-anchor="middle" fill="#b07a4a" font-size="9" letter-spacing="2">UNFOLDING</text>
  <text x="42" y="333" fill="#c09060" font-size="9">∇Φ → stable orbit</text>
  <text x="42" y="348" fill="#c09060" font-size="9">Persistent 40+ years</text>
  <text x="42" y="363" fill="#907050" font-size="9" font-style="italic">Voyager → Cassini → now</text>
  <line x1="185" y1="315" x2="394" y2="232" stroke="#b07a4a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrGold)"/>

  <!-- Corner labels -->
  <text x="450" y="127" text-anchor="middle" fill="#e08070" font-size="8">fold pt 1</text>
  <text x="518" y="165" fill="#e08070" font-size="8">fold pt 2</text>
  <text x="518" y="240" fill="#e08070" font-size="8">fold pt 3</text>
  <text x="450" y="278" text-anchor="middle" fill="#e08070" font-size="8">fold pt 4</text>
  <text x="358" y="240" fill="#e08070" font-size="8">fold pt 5</text>
  <text x="358" y="165" fill="#e08070" font-size="8">fold pt 6</text>

  <!-- Bottom annotation bar -->
  <rect x="30" y="440" width="840" height="100" rx="5" fill="#08101e" stroke="#c9a84c22" stroke-width="1"/>
  <text x="450" y="462" text-anchor="middle" fill="#c9a84c88" font-size="10" letter-spacing="2">TOGT LEVEL SCAFFOLD — CEFR ALIGNMENT</text>
  <line x1="50" y1="470" x2="850" y2="470" stroke="#c9a84c22" stroke-width="0.5"/>

  <!-- Level boxes -->
  <rect x="48" y="476" width="175" height="50" rx="3" fill="#0a1428" stroke="#2a4060" stroke-width="0.5"/>
  <text x="135" y="493" text-anchor="middle" fill="#4a7090" font-size="9" letter-spacing="1">A2 — OBSERVE</text>
  <text x="58" y="510" fill="#6a9ab0" font-size="8.5">"The jet bends six times"</text>
  <text x="58" y="524" fill="#5a8090" font-size="8">Label the corners on the map</text>

  <rect x="245" y="476" width="175" height="50" rx="3" fill="#0a0a20" stroke="#3a2060" stroke-width="0.5"/>
  <text x="332" y="493" text-anchor="middle" fill="#6a4090" font-size="9" letter-spacing="1">B1 — EXPLAIN</text>
  <text x="255" y="510" fill="#9070c0" font-size="8.5">"Rossby waves select n=6"</text>
  <text x="255" y="524" fill="#7858a0" font-size="8">Rotation rate + Coriolis</text>

  <rect x="442" y="476" width="175" height="50" rx="3" fill="#081808" stroke="#2a5038" stroke-width="0.5"/>
  <text x="529" y="493" text-anchor="middle" fill="#4a9070" font-size="9" letter-spacing="1">B2 — DERIVE</text>
  <text x="452" y="510" fill="#6ab090" font-size="8.5">"κ* selects the fold mode"</text>
  <text x="452" y="524" fill="#508070" font-size="8">Whitney A₁ + Jacobian rank</text>

  <rect x="639" y="476" width="195" height="50" rx="3" fill="#1a0e06" stroke="#503018" stroke-width="0.5"/>
  <text x="736" y="493" text-anchor="middle" fill="#906040" font-size="9" letter-spacing="1">C1 — UNIFY</text>
  <text x="649" y="510" fill="#c09060" font-size="8.5">"Saturn = HPA = market fold"</text>
  <text x="649" y="524" fill="#907050" font-size="8">Exact morphism in dm³-Cat</text>

  <!-- Footer -->
  <text x="450" y="553" text-anchor="middle" fill="#c9a84c33" font-size="8" letter-spacing="3">github.com/totogt/axle  ·  Principia Orthogona Vol. III</text>
</svg>
