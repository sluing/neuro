<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0e2240"/>
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1a5c"/>
      <stop offset="100%" style="stop-color:#1a0e40"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a2a"/>
      <stop offset="100%" style="stop-color:#0e2d18"/>
    </linearGradient>
    <linearGradient id="uGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2a1a"/>
      <stop offset="100%" style="stop-color:#2d1a0e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c9a84c"/>
    </marker>
    <marker id="arrowSilver" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a9ab0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <g stroke="#ffffff08" stroke-width="0.5">
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="225" y1="0" x2="225" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="675" y1="0" x2="675" y2="520"/>
  </g>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#c9a84c" font-size="20" letter-spacing="4" filter="url(#glow)">TOGT OPERATOR SEQUENCE</text>
  <text x="450" y="62" text-anchor="middle" fill="#8a9ab0" font-size="12" letter-spacing="2">G = U ∘ F ∘ K ∘ C</text>
  <line x1="150" y1="72" x2="750" y2="72" stroke="#c9a84c44" stroke-width="0.5"/>

  <!-- === C OPERATOR === -->
  <rect x="40" y="95" width="175" height="310" rx="6" fill="url(#cGrad)" stroke="#4a8ab0" stroke-width="1"/>
  <text x="127" y="125" text-anchor="middle" fill="#6ab4d8" font-size="28" font-weight="bold" filter="url(#glow)">C</text>
  <text x="127" y="145" text-anchor="middle" fill="#4a8ab0" font-size="11" letter-spacing="3">COMPRESSION</text>
  <line x1="60" y1="155" x2="195" y2="155" stroke="#4a8ab044" stroke-width="0.5"/>

  <text x="60" y="178" fill="#8ab8d0" font-size="10">Lipschitz map onto</text>
  <text x="60" y="193" fill="#8ab8d0" font-size="10">lower-dim submanifold</text>
  <text x="60" y="215" fill="#6a9ab0" font-size="10">κ = Lip(C) &lt; 1</text>
  <text x="60" y="240" fill="#5a8090" font-size="9.5">• Collapses bulk DOF</text>
  <text x="60" y="257" fill="#5a8090" font-size="9.5">• Projects to jet layer</text>
  <text x="60" y="274" fill="#5a8090" font-size="9.5">• Preserves topology</text>

  <!-- Domain example box -->
  <rect x="58" y="295" width="145" height="85" rx="4" fill="#0a1a2a" stroke="#2a5070" stroke-width="0.5"/>
  <text x="130" y="312" text-anchor="middle" fill="#4a8ab088" font-size="9" letter-spacing="1">INSTANTIATIONS</text>
  <text x="68" y="330" fill="#6a9ab0" font-size="9">♦ Saturn: 3D→2D troposphere</text>
  <text x="68" y="347" fill="#6a9ab0" font-size="9">♦ Market: price→index</text>
  <text x="68" y="364" fill="#6a9ab0" font-size="9">♦ Neural: spike→field</text>
  <text x="68" y="381" fill="#6a9ab0" font-size="9">♦ Collatz: n→orbit class</text>

  <!-- === K OPERATOR === -->
  <rect x="258" y="95" width="175" height="310" rx="6" fill="url(#kGrad)" stroke="#7a5ab0" stroke-width="1"/>
  <text x="345" y="125" text-anchor="middle" fill="#a07ae0" font-size="28" font-weight="bold" filter="url(#glow)">K</text>
  <text x="345" y="145" text-anchor="middle" fill="#7a5ab0" font-size="11" letter-spacing="3">CURVATURE</text>
  <line x1="278" y1="155" x2="413" y2="155" stroke="#7a5ab044" stroke-width="0.5"/>

  <text x="278" y="178" fill="#b090d8" font-size="10">Riemannian curvature</text>
  <text x="278" y="193" fill="#b090d8" font-size="10">drives κ → κ* threshold</text>
  <text x="278" y="215" fill="#9070c0" font-size="10">κ* = ε* Ric(g)</text>
  <text x="278" y="240" fill="#7858a0" font-size="9.5">• Rossby wavenumber</text>
  <text x="278" y="257" fill="#7858a0" font-size="9.5">• Mode selection</text>
  <text x="278" y="274" fill="#7858a0" font-size="9.5">• Critical threshold κ*</text>

  <rect x="276" y="295" width="145" height="85" rx="4" fill="#0e0a1e" stroke="#4a3070" stroke-width="0.5"/>
  <text x="348" y="312" text-anchor="middle" fill="#7a5ab088" font-size="9" letter-spacing="1">INSTANTIATIONS</text>
  <text x="286" y="330" fill="#9070c0" font-size="9">♦ Saturn: n=6 Rossby mode</text>
  <text x="286" y="347" fill="#9070c0" font-size="9">♦ Market: curvature spike</text>
  <text x="286" y="364" fill="#9070c0" font-size="9">♦ Neural: θ-γ coupling</text>
  <text x="286" y="381" fill="#9070c0" font-size="9">♦ HPA: cortisol threshold</text>

  <!-- === F OPERATOR === -->
  <rect x="476" y="95" width="175" height="310" rx="6" fill="url(#fGrad)" stroke="#4ab07a" stroke-width="1"/>
  <text x="563" y="125" text-anchor="middle" fill="#6ad0a0" font-size="28" font-weight="bold" filter="url(#glow)">F</text>
  <text x="563" y="145" text-anchor="middle" fill="#4ab07a" font-size="11" letter-spacing="3">FOLDING</text>
  <line x1="496" y1="155" x2="631" y2="155" stroke="#4ab07a44" stroke-width="0.5"/>

  <text x="496" y="178" fill="#8ad0b0" font-size="10">Whitney A₁ fold event</text>
  <text x="496" y="193" fill="#8ad0b0" font-size="10">Jacobian rank drop by 1</text>
  <text x="496" y="215" fill="#6ab090" font-size="10">det(Df) → 0 at fold pts</text>
  <text x="496" y="240" fill="#508070" font-size="9.5">• Locks stable geometry</text>
  <text x="496" y="257" fill="#508070" font-size="9.5">• Creates corner points</text>
  <text x="496" y="274" fill="#508070" font-size="9.5">• Symmetry crystallizes</text>

  <rect x="494" y="295" width="145" height="85" rx="4" fill="#081a0e" stroke="#2a5038" stroke-width="0.5"/>
  <text x="566" y="312" text-anchor="middle" fill="#4ab07a88" font-size="9" letter-spacing="1">INSTANTIATIONS</text>
  <text x="504" y="330" fill="#6ab090" font-size="9">♦ Saturn: 6 hex corners lock</text>
  <text x="504" y="347" fill="#6ab090" font-size="9">♦ Market: flash crash fold</text>
  <text x="504" y="364" fill="#6ab090" font-size="9">♦ Protein: fold topology</text>
  <text x="504" y="381" fill="#6ab090" font-size="9">♦ Collatz: orbit fold pts</text>

  <!-- === U OPERATOR === -->
  <rect x="694" y="95" width="175" height="310" rx="6" fill="url(#uGrad)" stroke="#b07a4a" stroke-width="1"/>
  <text x="781" y="125" text-anchor="middle" fill="#d0a060" font-size="28" font-weight="bold" filter="url(#glow)">U</text>
  <text x="781" y="145" text-anchor="middle" fill="#b07a4a" font-size="11" letter-spacing="3">UNFOLDING</text>
  <line x1="714" y1="155" x2="849" y2="155" stroke="#b07a4a44" stroke-width="0.5"/>

  <text x="714" y="178" fill="#d0b080" font-size="10">Gradient descent on Φ</text>
  <text x="714" y="193" fill="#d0b080" font-size="10">selects stable fixed point</text>
  <text x="714" y="215" fill="#b09060" font-size="10">∇Φ = 0 at attractor</text>
  <text x="714" y="240" fill="#907050" font-size="9.5">• Long-term persistence</text>
  <text x="714" y="257" fill="#907050" font-size="9.5">• Convergent orbit</text>
  <text x="714" y="274" fill="#907050" font-size="9.5">• Unique attractor</text>

  <rect x="712" y="295" width="145" height="85" rx="4" fill="#1a0e06" stroke="#503018" stroke-width="0.5"/>
  <text x="784" y="312" text-anchor="middle" fill="#b07a4a88" font-size="9" letter-spacing="1">INSTANTIATIONS</text>
  <text x="722" y="330" fill="#c09060" font-size="9">♦ Saturn: 40yr hexagon</text>
  <text x="722" y="347" fill="#c09060" font-size="9">♦ Market: regime stability</text>
  <text x="722" y="364" fill="#c09060" font-size="9">♦ Neural: memory encoding</text>
  <text x="722" y="381" fill="#c09060" font-size="9">♦ Collatz: reach {4,2,1}</text>

  <!-- Arrows between operators -->
  <line x1="217" y1="250" x2="255" y2="250" stroke="#c9a84c" stroke-width="1.5" marker-end="url(#arrowGold)"/>
  <line x1="435" y1="250" x2="473" y2="250" stroke="#c9a84c" stroke-width="1.5" marker-end="url(#arrowGold)"/>
  <line x1="653" y1="250" x2="691" y2="250" stroke="#c9a84c" stroke-width="1.5" marker-end="url(#arrowGold)"/>

  <!-- Composition labels -->
  <text x="236" y="243" text-anchor="middle" fill="#c9a84c" font-size="9">∘</text>
  <text x="454" y="243" text-anchor="middle" fill="#c9a84c" font-size="9">∘</text>
  <text x="672" y="243" text-anchor="middle" fill="#c9a84c" font-size="9">∘</text>

  <!-- Bottom bar: Banach contraction -->
  <rect x="40" y="428" width="829" height="68" rx="4" fill="#0a0a14" stroke="#c9a84c33" stroke-width="1"/>
  <text x="450" y="450" text-anchor="middle" fill="#c9a84c88" font-size="9.5" letter-spacing="2">BANACH FIXED POINT — CONVERGENCE THEOREM</text>
  <text x="450" y="470" text-anchor="middle" fill="#8a9ab0" font-size="10">Contraction constant  κ ≤ √(7/9) ≈ 0.882  from  ε* = 1/3  |  Orbit closure K compact  |  Unique attractor guaranteed</text>
  <text x="450" y="488" text-anchor="middle" fill="#5a6a7a" font-size="9">Assumes Structural Hypothesis SH: mutual orthogonality of perpendicular components — formal verification: open problem (Volume VI)</text>

  <!-- TOGT badge -->
  <text x="450" y="512" text-anchor="middle" fill="#c9a84c44" font-size="8" letter-spacing="4">github.com/totogt/axle  ·  Principia Orthogona</text>
</svg>
