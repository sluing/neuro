  - id: anantharaman_monk_2025
    name: "Anantharaman–Monk spectral gap for random hyperbolic surfaces"
    claim_level: analogical
    source: >
      Anantharaman, N. & Monk, L. (2023, rev. 2025). Friedman-Ramanujan
      functions in random hyperbolic geometry and application to spectral
      gaps [Part I]. arXiv:2304.02678 (v3 revised 2025-06-11).
      Anantharaman, N. & Monk, L. (2024). Spectral gap of random hyperbolic
      surfaces [roadmap]. arXiv:2403.12576.
      Anantharaman, N. & Monk, L. (2025). Friedman-Ramanujan functions ...
      [Part II]. arXiv:2502.12268 (submitted 2025-02-17, rev. 2025-06-11).
      Follow-up: Hide, W., Macera, D. & Thomas, J. (2025). Spectral gap with
      polynomial rate for Weil-Petersson random surfaces. arXiv:2508.14874.
    g_threshold: null
    togt_C: >
      Compression of closed geodesic length spectrum via Weil-Petersson
      probability measure on moduli space M_g; local topological type
      density V_g^T(l) encodes the reduction.
    togt_K: >
      Constant hyperbolic curvature κ = −1 of each surface; Weil-Petersson
      metric on moduli space M_g governs how geometry deforms with genus g.
    togt_F: >
      Ramanujan–Buser threshold λ₁ = 1/4 as the critical fold: the
      spectral gap bifurcates between sub-optimal (< 1/4) and optimal
      (≥ 1/4) regimes. The Buser 1984 conjecture is the statement that
      optimal surfaces are typical.
    togt_U: >
      Weil-Petersson Plancherel measure as universal attractor in the
      large-genus limit: almost all surfaces (measure → 1) settle into
      the optimal spectral-gap regime as g → ∞.
    togt_E: >
      Proved: P_WP(λ₁(X) ≤ 1/4 − α²) → 0 as g → ∞, for all α > 0.
      Polynomial-rate refinement (Hide–Macera–Thomas 2025):
      spectral gap ≥ 1/4 − O(1/g^c) with probability → 1.
    parameters: null
    parameter_status: asymptotic
    notes: >
      Result is fully proved across the Anantharaman–Monk series (2023–2025).
      For any ε > 0, a random genus-g hyperbolic surface has spectral gap
      ≥ 1/4 − ε with Weil-Petersson probability → 1 as g → ∞. Proof
      strategy adapts Friedman's Alon-conjecture argument for regular
      graphs to the hyperbolic-surface setting via new geodesic-length
      distribution methods. claim_level remains analogical: the GCM/dm³
      structural connection has no Lean file. All five TOGT questions map
      cleanly; this is the strongest analogical match in the 2025 cohort.

  - id: wang_zahl_2025
    name: "Wang–Zahl 3D Kakeya set conjecture (proved)"
    claim_level: analogical
    claim_level_note: >
      The underlying mathematical conjecture is PROVED (not open).
      claim_level = analogical refers only to the GCM/dm³ structural
      connection, which has no Lean file. Do not read claim_level as
      implying the Kakeya result is uncertain.
    source: >
      Wang, H. & Zahl, J. (2025). Volume estimates for unions of convex
      sets, and the Kakeya set conjecture in three dimensions.
      arXiv:2502.17655 (submitted 2025-02-24).
      Precursor (sticky case): Wang, H. & Zahl, J. (2022, rev. 2025).
      Sticky Kakeya sets and the sticky Kakeya conjecture. arXiv:2210.09581.
      Survey: Guth, L. (2025). Introduction to the proof of the Kakeya
      conjecture. arXiv:2505.07695.
      Outline: Guth, L. (2025). Outline of the Wang-Zahl proof of the
      Kakeya conjecture in R³. arXiv:2508.05475.
    g_threshold: null
    togt_C: >
      Besicovitch compression: a set of δ-tubes pointing in every direction
      in ℝ³ is forced into minimal volume; the convex Wolff axiom quantifies
      how many tubes can be contained inside any common convex set V.
    togt_K: >
      Curvature of the tube-sweep geometry in ℝ³; the convex Wolff axiom
      acts as a metric constraint on allowable tube interactions, replacing
      the classical Wolff axiom with a sharper convex-geometric condition.
    togt_F: >
      Dimension fold: the transition from sub-maximal Hausdorff dimension
      (< 3, as in all known near-miss examples) to the proved maximal value
      (= 3). The sticky Kakeya sub-case is the critical fold that unlocks
      the general proof via an induction-on-scales argument.
    togt_U: >
      Full-dimension Kakeya set as the unique attractor: every Kakeya set
      in ℝ³ has Minkowski and Hausdorff dimension exactly 3 (proved).
      No sub-maximal attractor survives the convex Wolff axiom constraints.
    togt_E: >
      Proved theorem: every Kakeya set K ⊂ ℝ³ (compact set containing a
      unit line segment in every direction) has Minkowski and Hausdorff
      dimension 3. Equivalently: the volume of the δ-neighbourhood N_δ(K)
      is bounded below by c/log(1/δ)^C (near-optimal).
    parameters: null
    parameter_status: binary
    notes: >
      CONJECTURE IS PROVED. Wang & Zahl (arXiv:2502.17655, Feb 2025) resolved
      the 3D Kakeya set conjecture via volume estimates for unions of convex
      sets satisfying the convex Wolff axiom. The proof proceeds in two stages:
      (1) sticky Kakeya conjecture in 3D (arXiv:2210.09581, building on
      Katz-Tao), then (2) reduction of the general case to the sticky case
      (arXiv:2502.17655). All five TOGT questions map cleanly. The proof
      structure — compression axiom → curvature constraint → dimension fold →
      attractor uniqueness → stability threshold — is the most transparent
      realisation of the C-K-F-U-E grammar among 2025 results. Guth's survey
      (arXiv:2505.07695) is the recommended secondary source for TOGT mapping
      verification. claim_level = analogical refers to the GCM connection only.

